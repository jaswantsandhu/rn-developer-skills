name: Feature Request
description: Suggest a new skill or improvement to existing guidance
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Describe the problem and the change you have in mind.

  - type: dropdown
    id: request-type
    attributes:
      label: Request type
      options:
        - New skill
        - Improvement to an existing skill
        - Documentation or tooling
    validations:
      required: true

  - type: input
    id: skill
    attributes:
      label: Skill (if applicable)
      description: Existing skill name or proposed kebab-case name for a new skill (e.g. `error-handling`).
      placeholder: error-handling

  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: What problem does this solve? What guidance is missing today?
      placeholder: When reviewing navigation code, there is no checklist for nested stack edge cases...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should be added or changed? Outline sections, checklist items, or examples if you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues to avoid duplicates
          required: true
