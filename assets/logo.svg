<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="React Native Developer Skills">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2038"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#61DAFB"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="skill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g opacity="0.08" stroke="#61DAFB" stroke-width="1">
    <line x1="96" y1="160" x2="416" y2="160"/>
    <line x1="96" y1="256" x2="416" y2="256"/>
    <line x1="96" y1="352" x2="416" y2="352"/>
    <line x1="160" y1="96" x2="160" y2="416"/>
    <line x1="352" y1="96" x2="352" y2="416"/>
  </g>

  <g fill="none" stroke="url(#orbit)" stroke-width="10" stroke-linecap="round" filter="url(#glow)">
    <ellipse cx="256" cy="256" rx="148" ry="56" transform="rotate(0 256 256)"/>
    <ellipse cx="256" cy="256" rx="148" ry="56" transform="rotate(60 256 256)"/>
    <ellipse cx="256" cy="256" rx="148" ry="56" transform="rotate(120 256 256)"/>
  </g>

  <g transform="translate(256 256)">
    <rect x="-52" y="-18" width="88" height="104" rx="10" fill="url(#skill)" opacity="0.55" transform="rotate(-8)"/>
    <rect x="-46" y="-28" width="88" height="104" rx="10" fill="url(#skill)" opacity="0.78" transform="rotate(4)"/>
    <g transform="translate(-40 -38)">
      <rect width="88" height="104" rx="10" fill="url(#skill)"/>
      <rect x="14" y="18" width="36" height="6" rx="3" fill="url(#accent)"/>
      <rect x="14" y="32" width="60" height="4" rx="2" fill="#94a3b8"/>
      <rect x="14" y="42" width="52" height="4" rx="2" fill="#94a3b8"/>
      <rect x="14" y="52" width="56" height="4" rx="2" fill="#94a3b8"/>
      <rect x="14" y="62" width="44" height="4" rx="2" fill="#94a3b8"/>
      <circle cx="68" cy="82" r="14" fill="#0d1117"/>
      <circle cx="68" cy="82" r="12" fill="#22c55e"/>
      <path d="M62 82 L66 86 L74 76" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <circle cx="256" cy="256" r="10" fill="#61DAFB" filter="url(#glow)"/>
</svg>
